# =============================================================================
# Memorial Website - CI Pipeline
# =============================================================================
# Runs on PRs and pushes to main/dev. Two parallel jobs:
#   - quality: format:check, lint, typecheck
#   - test:    jest with coverage, uploads coverage artifact
# Both must pass for the summary job to succeed.
# =============================================================================

name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format / Lint / Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  test:
    name: Test with Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests with coverage
        env:
          NODE_ENV: test
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 30

  ci-success:
    name: CI Workflow
    runs-on: ubuntu-latest
    needs: [quality, test]
    if: always()

    steps:
      - name: Quality Gate Summary
        run: |
          echo "========================================"
          echo "Memorial Website - CI Quality Gate"
          echo "========================================"
          echo "Quality: ${{ needs.quality.result }}"
          echo "Test:    ${{ needs.test.result }}"
          echo "========================================"
          if [ "${{ needs.quality.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed"
